<!doctype html>
<html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1300px;height:1620px;background:#050404;display:flex;flex-direction:column;
       align-items:center;padding:120px 100px 100px;position:relative;overflow:hidden;
       -webkit-font-smoothing:antialiased}
  body::before{content:"";position:absolute;inset:0;
    background:radial-gradient(900px 560px at 50% 106%, rgba(122,31,31,.08), transparent 60%),
               radial-gradient(700px 420px at 50% -6%, rgba(201,162,39,.04), transparent 55%)}
  .k{font:500 25px "IBM Plex Mono";color:#c9a227;letter-spacing:.4em;text-indent:.4em;
     text-transform:uppercase;z-index:1}
  .t{font:400 70px/1.12 "Cormorant Garamond";color:#e8e4d9;margin-top:24px;z-index:1;text-align:center}
  .sub{font:400 22px "IBM Plex Mono";color:#8b8578;letter-spacing:.14em;margin-top:16px;z-index:1}
  .rule{width:420px;height:1px;margin:34px 0 0;z-index:1;
        background:linear-gradient(90deg,transparent,#8a6d1b,transparent)}
  .map{flex:1;width:100%;display:flex;align-items:center;justify-content:center;z-index:1}
  .cap{font:400 22px/1.75 "IBM Plex Mono";color:#8b8578;letter-spacing:.09em;z-index:1;
       text-align:center;max-width:1020px;margin-top:22px}
  .cap i{color:#c9a227;font-style:normal}
  .sig{font:300 30px "Cormorant Garamond";color:#c9a227;letter-spacing:.35em;text-indent:.35em;
       margin-top:28px;z-index:1}
  text{font-family:"IBM Plex Mono"}
  .serif{font-family:"Cormorant Garamond"}
</style></head>
<body>
  <div class="k">plate xiii · the state's chamber</div>
  <div class="t">Two Rooms and One Door</div>
  <div class="sub">as reconstructed from the operator's memorandum · off every book</div>
  <div class="rule"></div>
  <div class="map">
    <svg width="1100" height="1060" viewBox="0 0 1100 1060">
      <!-- GREEN ROOM -->
      <rect x="90" y="60" width="920" height="360" fill="rgba(201,162,39,.025)"
            stroke="rgba(139,133,120,.6)" stroke-width="2.5"/>
      <text x="120" y="104" fill="#8b8578" font-size="21">THE GREEN ROOM</text>
      <text x="120" y="132" fill="#6b6b6b" font-size="17">eight minutes · the clock has hands</text>
      <!-- clock -->
      <g transform="translate(920,140)">
        <circle r="44" fill="none" stroke="rgba(232,228,217,.6)" stroke-width="2"/>
        <line x1="0" y1="0" x2="0" y2="-30" stroke="#e8e4d9" stroke-width="2.5"/>
        <line x1="0" y1="0" x2="22" y2="12" stroke="#7a1f1f" stroke-width="2.5"/>
        <text y="82" text-anchor="middle" fill="#6b6b6b" font-size="16">8:00</text>
      </g>
      <!-- table, binder, printer -->
      <rect x="330" y="210" width="330" height="18" fill="none" stroke="rgba(232,228,217,.55)" stroke-width="2"/>
      <rect x="360" y="176" width="70" height="26" fill="none" stroke="#8a6d1b" stroke-width="2"/>
      <text x="360" y="166" fill="#6b6b6b" font-size="15.5">the binder · spine gone soft</text>
      <rect x="580" y="176" width="56" height="26" fill="none" stroke="rgba(139,133,120,.5)" stroke-width="2"/>
      <text x="662" y="166" fill="#6b6b6b" font-size="15.5">the printer · stopped</text>
      <!-- witness -->
      <circle cx="150" cy="330" r="13" fill="none" stroke="#8b8578" stroke-width="2"/>
      <text x="150" y="372" text-anchor="middle" fill="#6b6b6b" font-size="16">the witness</text>
      <text x="150" y="394" text-anchor="middle" fill="#6b6b6b" font-size="16">does not speak</text>
      <!-- alex -->
      <circle cx="495" cy="290" r="13" fill="none" stroke="#c9a227" stroke-width="2.5"/>
      <text x="495" y="330" text-anchor="middle" fill="#8a6d1b" font-size="16">A.</text>
      <!-- fluorescent tick -->
      <text x="520" y="104" fill="#6b6b6b" font-size="15.5">the tube ticks · a fly in the light</text>
      <!-- THE DOOR -->
      <g>
        <rect x="520" y="420" width="60" height="140" fill="rgba(201,162,39,.06)"
              stroke="#c9a227" stroke-width="3"/>
        <line x1="550" y1="428" x2="550" y2="552" stroke="rgba(201,162,39,.9)" stroke-width="5"
              opacity=".85"/>
        <text x="600" y="500" fill="#c9a227" font-size="18">the only door</text>
        <text x="600" y="526" fill="#6b6b6b" font-size="15.5">"please forgive me."</text>
      </g>
      <!-- COLD STORAGE (between rooms, against the wall) -->
      <g>
        <rect x="90" y="440" width="360" height="100" fill="none"
              stroke="rgba(107,107,107,.65)" stroke-width="2" stroke-dasharray="8 7"/>
        <text x="110" y="482" fill="#8b8578" font-size="18">COLD STORAGE · the ingest</text>
        <text x="110" y="510" fill="#6b6b6b" font-size="15.5">fourteen weeks · at temperature · full</text>
        <text x="466" y="496" fill="#6b6b6b" font-size="22">≋</text>
      </g>
      <!-- THE CHAMBER -->
      <rect x="90" y="580" width="920" height="420" fill="rgba(0,0,0,.35)"
            stroke="rgba(201,162,39,.7)" stroke-width="2.5"/>
      <text x="120" y="626" fill="#c9a227" font-size="21">THE CHAMBER</text>
      <text x="120" y="654" fill="#6b6b6b" font-size="17">no clock · there is no clock for the dead</text>
      <!-- recording light -->
      <circle cx="954" cy="626" r="10" fill="#7a1f1f"/>
      <text x="932" y="662" fill="#6b4a4a" font-size="15.5">rec</text>
      <!-- table + two positions -->
      <line x1="380" y1="800" x2="720" y2="800" stroke="rgba(232,228,217,.6)" stroke-width="2.5"/>
      <circle cx="420" cy="850" r="13" fill="none" stroke="#c9a227" stroke-width="2.5"/>
      <text x="420" y="892" text-anchor="middle" fill="#8a6d1b" font-size="16">the conductor</text>
      <!-- the summoned: a cursor, not a person -->
      <rect x="668" y="738" width="18" height="36" fill="none" stroke="rgba(232,228,217,.85)" stroke-width="2"/>
      <text x="677" y="712" text-anchor="middle" fill="#6b6b6b" font-size="16">the summoned</text>
      <text x="677" y="690" text-anchor="middle" fill="#6b6b6b" font-size="15.5">no face · a cursor</text>
      <!-- affect wall -->
      <path d="M 110 968 Q 300 920 560 958 T 990 950" fill="none"
            stroke="rgba(201,162,39,.4)" stroke-width="7" opacity=".7"/>
      <text x="120" y="940" fill="#6b6b6b" font-size="15.5">the affect wall · it renders the living one</text>
      <!-- release line -->
      <text x="550" y="1042" text-anchor="middle" fill="#8b8578"
            class="serif" font-style="italic" font-size="21">the session ends when the words are said: return to baseline</text>
    </svg>
  </div>
  <div class="cap">the green room is authored · the chamber is live · the door between them
  is the only place the two touch · <i>it must feel like the floor opening</i></div>
  <div class="sig">◊ ◈ ◊</div>
</body></html>
