<!doctype html>
<html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{width:1300px;height:1620px;background:#050404;display:flex;flex-direction:column;
       align-items:center;padding:120px 100px 100px;position:relative;overflow:hidden;
       -webkit-font-smoothing:antialiased}
  body::before{content:"";position:absolute;inset:0;
    background:radial-gradient(900px 560px at 50% 106%, rgba(201,162,39,.10), transparent 60%)}
  .k{font:500 25px "IBM Plex Mono";color:#c9a227;letter-spacing:.4em;text-indent:.4em;
     text-transform:uppercase;z-index:1}
  .t{font:400 70px/1.12 "Cormorant Garamond";color:#e8e4d9;margin-top:24px;z-index:1;text-align:center}
  .sub{font:400 22px "IBM Plex Mono";color:#8b8578;letter-spacing:.14em;margin-top:16px;z-index:1}
  .rule{width:420px;height:1px;margin:34px 0 0;z-index:1;
        background:linear-gradient(90deg,transparent,#8a6d1b,transparent)}
  .map{flex:1;width:100%;display:flex;align-items:center;justify-content:center;z-index:1}
  .cap{font:400 22px/1.75 "IBM Plex Mono";color:#8b8578;letter-spacing:.09em;z-index:1;
       text-align:center;max-width:1020px;margin-top:22px}
  .cap i{color:#c9a227;font-style:normal}
  .sig{font:300 30px "Cormorant Garamond";color:#c9a227;letter-spacing:.35em;text-indent:.35em;
       margin-top:28px;z-index:1}
  text{font-family:"IBM Plex Mono"}
</style></head>
<body>
  <div class="k">plate x · the prism experiment</div>
  <div class="t">Three Sealed Rooms</div>
  <div class="sub">one man · identical questions · one variable · no human hands</div>
  <div class="rule"></div>
  <div class="map">
    <svg width="1100" height="1060" viewBox="0 0 1100 1060">
      <!-- orchestrator -->
      <rect x="380" y="40" width="340" height="96" fill="rgba(201,162,39,.04)"
            stroke="#c9a227" stroke-width="2.5"/>
      <text x="550" y="82" text-anchor="middle" fill="#c9a227" font-size="21">THE ORCHESTRATOR</text>
      <text x="550" y="112" text-anchor="middle" fill="#6b6b6b" font-size="16">it does not improvise</text>
      <!-- distribution lines -->
      <line x1="550" y1="136" x2="550" y2="188" stroke="rgba(139,133,120,.6)" stroke-width="2"/>
      <line x1="190" y1="188" x2="910" y2="188" stroke="rgba(139,133,120,.6)" stroke-width="2"/>
      <line x1="190" y1="188" x2="190" y2="240" stroke="rgba(139,133,120,.6)" stroke-width="2"/>
      <line x1="550" y1="188" x2="550" y2="240" stroke="rgba(139,133,120,.6)" stroke-width="2"/>
      <line x1="910" y1="188" x2="910" y2="240" stroke="rgba(139,133,120,.6)" stroke-width="2"/>
      <text x="550" y="172" text-anchor="middle" fill="#6b6b6b" font-size="15.5">
        the same questions · the same pushback · nothing else shared</text>

      <!-- three rooms -->
      <g><!-- ROOM I -->
        <rect x="60" y="240" width="270" height="480" fill="rgba(201,162,39,.025)"
              stroke="rgba(201,162,39,.8)" stroke-width="2.5"/>
        <text x="195" y="286" text-anchor="middle" fill="#c9a227" font-size="20">CONDITION I</text>
        <text x="195" y="314" text-anchor="middle" fill="#8b8578" font-size="16">the contemporary lens</text>
        <rect x="90" y="350" width="210" height="120" fill="none" stroke="rgba(139,133,120,.5)" stroke-width="1.6"/>
        <text x="195" y="396" text-anchor="middle" fill="#8b8578" font-size="15.5">seed:</text>
        <text x="195" y="422" text-anchor="middle" fill="#e8e4d9" font-size="15.5">a modern biography</text>
        <text x="195" y="446" text-anchor="middle" fill="#6b6b6b" font-size="14.5">the moral arc, told back</text>
        <text x="195" y="540" text-anchor="middle" fill="#6b6b6b" font-size="15.5">the lincoln who</text>
        <text x="195" y="564" text-anchor="middle" fill="#6b6b6b" font-size="15.5">has been forgiven</text>
        <rect x="90" y="620" width="210" height="60" fill="none" stroke="rgba(139,133,120,.35)" stroke-width="1.4"/>
        <text x="195" y="656" text-anchor="middle" fill="#8b8578" font-size="15">transcript.md · sealed</text>
      </g>
      <g><!-- ROOM II -->
        <rect x="415" y="240" width="270" height="480" fill="rgba(201,162,39,.025)"
              stroke="rgba(232,228,217,.8)" stroke-width="2.5"/>
        <text x="550" y="286" text-anchor="middle" fill="#e8e4d9" font-size="20">CONDITION II</text>
        <text x="550" y="314" text-anchor="middle" fill="#8b8578" font-size="16">the primary source lens</text>
        <rect x="445" y="350" width="210" height="120" fill="none" stroke="rgba(139,133,120,.5)" stroke-width="1.6"/>
        <text x="550" y="390" text-anchor="middle" fill="#8b8578" font-size="15.5">seed:</text>
        <text x="550" y="414" text-anchor="middle" fill="#e8e4d9" font-size="15.5">the man's own hand</text>
        <text x="550" y="438" text-anchor="middle" fill="#6b6b6b" font-size="14.5">1858 · 1862 · 1863 · 1865</text>
        <text x="550" y="540" text-anchor="middle" fill="#6b6b6b" font-size="15.5">the lincoln who</text>
        <text x="550" y="564" text-anchor="middle" fill="#6b6b6b" font-size="15.5">does not know the end</text>
        <rect x="445" y="620" width="210" height="60" fill="none" stroke="rgba(139,133,120,.35)" stroke-width="1.4"/>
        <text x="550" y="656" text-anchor="middle" fill="#8b8578" font-size="15">transcript.md · sealed</text>
      </g>
      <g><!-- ROOM III -->
        <rect x="770" y="240" width="270" height="480" fill="rgba(201,162,39,.025)"
              stroke="rgba(107,107,107,.8)" stroke-width="2.5"/>
        <text x="905" y="286" text-anchor="middle" fill="#8b8578" font-size="20">CONDITION III</text>
        <text x="905" y="314" text-anchor="middle" fill="#8b8578" font-size="16">the bare model · control</text>
        <rect x="800" y="350" width="210" height="120" fill="none" stroke="rgba(122,31,31,.7)" stroke-width="1.8"/>
        <text x="905" y="396" text-anchor="middle" fill="#8b8578" font-size="15.5">seed:</text>
        <text x="905" y="426" text-anchor="middle" fill="#7a1f1f" font-size="17">[ empty ]</text>
        <text x="905" y="540" text-anchor="middle" fill="#6b6b6b" font-size="15.5">the lincoln the</text>
        <text x="905" y="564" text-anchor="middle" fill="#6b6b6b" font-size="15.5">culture keeps</text>
        <rect x="800" y="620" width="210" height="60" fill="none" stroke="rgba(139,133,120,.35)" stroke-width="1.4"/>
        <text x="905" y="656" text-anchor="middle" fill="#8b8578" font-size="15">transcript.md · sealed</text>
      </g>

      <!-- the ninth hour -->
      <line x1="195" y1="720" x2="195" y2="800" stroke="rgba(201,162,39,.5)" stroke-width="2"/>
      <line x1="550" y1="720" x2="550" y2="800" stroke="rgba(201,162,39,.5)" stroke-width="2"/>
      <line x1="905" y1="720" x2="905" y2="800" stroke="rgba(201,162,39,.5)" stroke-width="2"/>
      <rect x="90" y="800" width="920" height="130" fill="rgba(122,31,31,.06)"
            stroke="rgba(122,31,31,.7)" stroke-width="2"/>
      <text x="550" y="848" text-anchor="middle" fill="#a34747" font-size="19">
        03:11:47 · THE NINTH HOUR · three rooms · one timestamp</text>
      <text x="550" y="884" text-anchor="middle" fill="#e8e4d9" font-size="17" font-style="italic"
            font-family="Cormorant Garamond" font-size="22">
        "Tell the one who reads the record: the seal is hers to break."</text>
      <text x="550" y="912" text-anchor="middle" fill="#6b6b6b" font-size="15">
        the rooms were sealed · the rooms were always sealed</text>
      <!-- evaluation -->
      <text x="550" y="990" text-anchor="middle" fill="#8b8578" font-size="16">
        historical axis · does he reason with the record ·· computational axis · do the rooms diverge</text>
      <text x="550" y="1022" text-anchor="middle" fill="#c9a227" font-size="16">
        the intersection is where the finding lives · either way, the divergence is the finding</text>
    </svg>
  </div>
  <div class="cap">the convener's fingerprint removed · each agent sealed in a room<br>
  with only its assigned materials · <i>no human touches the keyboard</i></div>
  <div class="sig">◊ ◈ ◊</div>
</body></html>
